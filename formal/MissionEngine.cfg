\* MissionEngine TLC configuration
\* Run: tlc MissionEngine.tla -config MissionEngine.cfg

\* -------------------------------------------------------------------
\* Model values — a 4-phase workflow: design → dev → gate → qa
\* -------------------------------------------------------------------
CONSTANTS
    Phases = {"design", "dev", "gate", "qa"}
    PhaseOrder = <<"design", "dev", "gate", "qa">>
    PhaseTypes = [design |-> "once", dev |-> "sprint", gate |-> "gate", qa |-> "feedback_loop"]
    MaxSprintIter = 3
    MaxFeedbackIter = 3
    GateTargets = [design |-> "none", dev |-> "none", gate |-> "dev", qa |-> "none"]
    NumAgents = 4
    MaxRetries = 3

\* -------------------------------------------------------------------
\* Invariants to check (safety — must ALWAYS hold)
\* -------------------------------------------------------------------
INVARIANTS
    TypeInvariant
    NoVetoInYolo
    CompletedMeansWork
    RetryBounded
    AgentRoundBounded

\* -------------------------------------------------------------------
\* Properties to check (liveness — must EVENTUALLY hold)
\* -------------------------------------------------------------------
PROPERTIES
    MissionTerminates
    NoPhaseLivelock

\* -------------------------------------------------------------------
\* Specification
\* -------------------------------------------------------------------
SPECIFICATION Spec
